<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Conversor de Temperatura </title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="img/umidade.png" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="title-wrapper">
            <span class="temp-icon">🌡️</span>
            <h2>Conversor Térmico</h2>
        </div>

        <!-- Campo de temperatura -->
        <div class="input-group">
            <label for="valor">Temperatura</label>
            <input type="number" id="valor" placeholder="Ex: 25.5" step="any" value="0">
        </div>

        <!-- Seletores lado a lado -->
        <div class="row-duo">
            <div class="input-group select-wrapper">
                <label for="de">De</label>
                <select id="de">
                    <option value="c">Celsius (°C)</option>
                    <option value="f">Fahrenheit (°F)</option>
                    <option value="k">Kelvin (K)</option>
                </select>
            </div>
            <div class="input-group select-wrapper">
                <label for="para">Para</label>
                <select id="para">
                    <option value="c">Celsius (°C)</option>
                    <option value="f" selected>Fahrenheit (°F)</option>
                    <option value="k">Kelvin (K)</option>
                </select>
            </div>
        </div>

     
        <button id="btn-converter">Converter agora</button>

        <div class="result" id="resultado">
            <span id="resultado-texto">—</span>
        </div>

        <div class="footnote">
             Precisão de até 4 casas decimais
        </div>
    </div>

    
    
</body>
<script src="js/script.js"></script>
</html>
